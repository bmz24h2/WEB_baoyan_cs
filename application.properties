server.port=8080

# SQLite 数据库路径（相对于项目根目录）
spring.datasource.url=jdbc:sqlite:output/faculty.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.username=
spring.datasource.password=

# 关闭Spring Boot自动建表（由DatabaseService手动建表）
spring.sql.init.mode=never

# 跨域（前端直接打开HTML文件时需要）
spring.web.cors.allowed-origins=*

# 日志
logging.file.name=output/scraper.log
logging.level.com.baoyan=INFO

# 爬虫配置
scraper.concurrency=4
scraper.request-delay-min=2000
scraper.request-delay-max=4000
scraper.max-retries=4
scraper.timeout=15000

# URL验证配置
verifier.concurrency=8
verifier.timeout=12000


