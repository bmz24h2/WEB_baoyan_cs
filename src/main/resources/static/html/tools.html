<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>保研工具箱</title>
<link rel="stylesheet" href="/css/frontend.css">
<style>
/* ── 自定义输入弹窗（替代浏览器 prompt）── */
.modal-mask {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.35); z-index: 9999;
  align-items: center; justify-content: center;
}
.modal-mask.show { display: flex; }
.modal-box {
  background: var(--surface); border-radius: 12px;
  padding: 24px 28px 20px; min-width: 300px; max-width: 420px;
  box-shadow: 0 8px 32px rgba(0,0,0,.18);
  border: 0.5px solid var(--border);
}
.modal-title { font-size: 15px; font-weight: 700; margin-bottom: 14px; }
.modal-input {
  width: 100%; box-sizing: border-box;
  border: 1px solid var(--border2); border-radius: 7px;
  padding: 9px 12px; font-size: 14px; background: var(--surface2);
  color: var(--text1); outline: none; margin-bottom: 16px;
}
.modal-input:focus { border-color: var(--purple-mid); }
.modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
.modal-btn-cancel {
  padding: 7px 18px; border-radius: 7px; font-size: 13px; cursor: pointer;
  border: 1px solid var(--border2); background: var(--surface2); color: var(--text2);
}
.modal-btn-ok {
  padding: 7px 18px; border-radius: 7px; font-size: 13px; cursor: pointer;
  border: none; background: var(--purple-mid,#7c4dff); color: #fff; font-weight: 600;
}
.tools-wrap {
  width: 100%;
  padding: 20px 20px 48px;
  box-sizing: border-box;
}
.tools-title { font-size: 22px; font-weight: 700; letter-spacing: -.02em; margin-bottom: 4px; }
.tools-sub   { font-size: 12.5px; color: var(--text2); margin-bottom: 20px; }

.section-sep {
  margin: 32px 0 18px;
  font-size: 11px; font-weight: 600; letter-spacing: .10em; text-transform: uppercase;
  color: var(--text3); display: flex; align-items: center; gap: 10px;
}
.section-sep::after { content:''; flex:1; height:0.5px; background:var(--border); }

/* ── 看板：5列均分全宽 ── */
.kanban {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 12px;
}
@media(max-width:1100px){ .kanban { grid-template-columns: repeat(3,1fr); } }
@media(max-width:700px)  { .kanban { grid-template-columns: repeat(2,1fr); } }
@media(max-width:480px)  { .kanban { grid-template-columns: 1fr; } }

.kanban-col {
  background: var(--surface2);
  border: 0.5px solid var(--border);
  border-radius: var(--r);
  padding: 12px;
  min-height: 140px;
}
.kanban-col-title {
  font-size: 12px; font-weight: 700;
  margin-bottom: 10px;
  display: flex; align-items: center; gap: 6px;
}
.kanban-count {
  font-size: 11px; background: var(--surface3);
  color: var(--text3); border-radius: 10px; padding: 1px 7px;
}
.kanban-item {
  background: var(--surface); border: 0.5px solid var(--border);
  border-radius: var(--r-sm); padding: 8px 10px; margin-bottom: 6px;
  cursor: pointer; font-size: 12px; transition: border-color .12s;
}
.kanban-item:hover { border-color: var(--border2); }
.kanban-item-name { font-weight: 600; margin-bottom: 2px; }
.kanban-item-meta { font-size: 11px; color: var(--text3); }
.kanban-add {
  width: 100%; font-size: 12px; padding: 7px;
  background: none; border: 0.5px dashed var(--border2);
  border-radius: var(--r-sm); color: var(--text3);
  cursor: pointer; transition: all .12s;
}
.kanban-add:hover { background: var(--surface3); color: var(--text2); }

/* ── 邮件生成：两列表单 ── */
.email-two-col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-bottom: 14px;
}
@media(max-width:700px){ .email-two-col { grid-template-columns: 1fr; } }

.email-out {
  background: var(--surface2); border-radius: var(--r-sm);
  padding: 16px; font-size: 13px; line-height: 1.85;
  white-space: pre-wrap; font-family: inherit;
  margin-top: 12px; display: none;
  border: 0.5px solid var(--border);
  max-height: 420px; overflow-y: auto;
}
.copy-btn { margin-top: 8px; }

/* ── GPA 换算：4列 ── */
.gpa-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
}
@media(max-width:800px){ .gpa-grid { grid-template-columns: 1fr 1fr; } }

.gpa-result {
  background: var(--green-bg); color: var(--green-txt);
  border-radius: var(--r-sm); padding: 14px 18px;
  margin-top: 12px; font-size: 14px; font-weight: 600; display: none;
}

/* ── 响应式 ── */
@media(max-width:700px){
  .tools-wrap { padding: 14px 14px 48px; }
}
</style>
<script src="/js/core/nav.js"></script>
<script src="/js/core/auth.js"></script>
</head>
<body>

<nav class="topnav"></nav>

<div class="tools-wrap">
  <div class="tools-title">🛠 保研工具箱</div>
  <div class="tools-sub">本地工具 4 个 · 数据存浏览器，无需后端 · 顶部导航栏可直达「导师匹配」和「数据分析」</div>

  <div class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('tracker',this)">📋 申请追踪</button>
    <button class="tab-btn" onclick="switchTab('timeline',this)">📅 时间线</button>
    <button class="tab-btn" onclick="switchTab('email',this)">✉️ 邮件生成</button>
    <button class="tab-btn" onclick="switchTab('gpa',this)">🔢 GPA 换算</button>
  </div>

  <!-- Tab 1: 申请追踪（完整版） -->
  <div class="tab-pane active" id="tab-tracker">
    <div id="tracker-root"></div>
  </div>

  <!-- Tab 2: 时间线 -->
  <div class="tab-pane" id="tab-timeline">
    <div class="timeline" id="timeline-list"></div>
  </div>

  <!-- Tab 3: 邮件生成 -->
  <div class="tab-pane" id="tab-email">
    <div class="email-two-col">
      <div>
        <div class="form-group">
          <label class="form-label">场景</label>
          <select class="form-select" id="email-scene">
            <option value="intro">初次联系导师</option>
            <option value="camp">夏令营意向</option>
            <option value="pre">预推免意向确认</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">你的姓名</label>
          <input class="form-input" id="your-name" placeholder="张三">
        </div>
        <div class="form-group">
          <label class="form-label">你的本科院校</label>
          <input class="form-input" id="your-school" placeholder="XX大学">
        </div>
        <div class="form-group">
          <label class="form-label">你的专业 / GPA</label>
          <input class="form-input" id="your-major" placeholder="计算机科学与技术 / 3.8/4.0（专业前5%）">
        </div>
      </div>
      <div>
        <div class="form-group">
          <label class="form-label">目标导师姓名</label>
          <input class="form-input" id="prof-name" placeholder="王教授">
        </div>
        <div class="form-group">
          <label class="form-label">导师所在院校</label>
          <input class="form-input" id="prof-school" placeholder="清华大学">
        </div>
        <div class="form-group">
          <label class="form-label">导师研究方向</label>
          <input class="form-input" id="prof-dir" placeholder="机器学习、计算机视觉">
        </div>
        <div class="form-group">
          <label class="form-label">你的相关经历（简要）</label>
          <textarea class="form-textarea" id="your-exp" placeholder="发表过 XX 论文 / 参与 XX 项目…"></textarea>
        </div>
      </div>
    </div>
    <button class="btn btn-pri btn-full" onclick="genEmail()">生成邮件</button>
    <div class="email-out" id="email-out"></div>
    <button class="btn btn-sm copy-btn" id="copy-btn" style="display:none" onclick="copyEmail()">复制邮件</button>
  </div>

  <!-- Tab 4: GPA 换算 -->
  <div class="tab-pane" id="tab-gpa">
    <div class="gpa-grid">
      <div class="form-group">
        <label class="form-label">输入制度</label>
        <select class="form-select" id="gpa-from">
          <option value="4.0">4.0 制</option>
          <option value="4.3">4.3 制</option>
          <option value="5.0">5.0 制</option>
          <option value="100">百分制</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">GPA 数值</label>
        <input class="form-input" id="gpa-val" type="number" step="0.01" placeholder="3.82">
      </div>
      <div class="form-group">
        <label class="form-label">专业总人数</label>
        <input class="form-input" id="rank-total" type="number" placeholder="120">
      </div>
      <div class="form-group">
        <label class="form-label">你的排名</label>
        <input class="form-input" id="rank-pos" type="number" placeholder="8">
      </div>
    </div>
    <button class="btn btn-pri btn-full" onclick="calcGPA()">计算</button>
    <div class="gpa-result" id="gpa-result"></div>
  </div>

</div>

<script>
function switchTab(id, btn){
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  btn.classList.add('active');
  if(id==='tracker'){ campLoad(); campRender(); }
  if(id==='timeline') renderTimeline();
}

const TL_ITEMS = [
  {date:'3–5 月', title:'确定目标院校', desc:'整理强弱 com 数据，建立院校候选清单，初步确定 3–6 所目标院校。', status:'done'},
  {date:'4–5 月', title:'联系导师', desc:'发送 Pre-Contact 邮件，了解导师招生意向，建立初步联系。', status:'done'},
  {date:'6–7 月', title:'夏令营报名', desc:'各校夏令营陆续开放报名，注意截止时间，准备推荐信和个人陈述。', status:'current'},
  {date:'7–8 月', title:'参加夏令营', desc:'参加优营考核，争取优秀营员（offer 最可靠），做好面试准备。', status:'future'},
  {date:'8 月下旬', title:'预推免系统开放', desc:'教育部系统开放，各校陆续发布招生名额，优先确认已有 offer 院校。', status:'future'},
  {date:'9 月初', title:'填报志愿', desc:'系统开放后 72 小时内填报，优先级排序要清晰，避免档案被锁。', status:'future'},
  {date:'9 月中旬', title:'待录取 / 调剂', desc:'各校公示名单，落榜学生进入调剂阶段。关注实验室补录公告。', status:'future'},
  {date:'10–11 月', title:'政审 / 录取', desc:'完成体检、政审，签收录取通知，确认入学事宜。', status:'future'},
];

function renderTimeline(){
  document.getElementById('timeline-list').innerHTML = TL_ITEMS.map(t=>`
  <div class="tl-item">
    <div class="tl-dot ${t.status}"></div>
    <div class="tl-date">${t.date}</div>
    <div class="tl-title">${t.title}</div>
    <div class="tl-desc">${t.desc}</div>
  </div>`).join('');
}

// ── 申请追踪（多类型：夏令营 / 预推免 / 实验室） ─────────────────────

const TRACK_TYPES = {
  camp: {
    key: 'baoyan_camps_v2', label: '夏令营',
    namePlaceholder: '如：计算机学院暑期夏令营', schoolPlaceholder: '如：浙江大学',
    sentLabel: '是否投递', sentDateLabel: '投递日期', deadlineLabel: '截止日期',
    replyOptions: ['待回复','录取','等待','拒绝','排除'],
    dropStates: ['排除'],
    replyColors: {
      '录取':'background:#EAF3DE;color:#3B6D11','等待':'background:#FAEEDA;color:#BA7517',
      '拒绝':'background:#FCEBEB;color:#A32D2D','待回复':'background:var(--surface2);color:var(--text3)',
      '排除':'background:var(--surface2);color:var(--text3)',
    },
    statDefs: [
      {l:'总计',    f:a=>a.length,                              c:'var(--text)'},
      {l:'已投递',  f:a=>a.filter(i=>i.sent==='yes').length,   c:'#185FA5'},
      {l:'已录取',  f:a=>a.filter(i=>i.reply==='录取').length, c:'#3B6D11'},
      {l:'等待中',  f:a=>a.filter(i=>i.reply==='等待').length, c:'#BA7517'},
      {l:'已拒绝',  f:a=>a.filter(i=>i.reply==='拒绝').length, c:'#A32D2D'},
      {l:'已排除',  f:a=>a.filter(i=>i.reply==='排除').length, c:'var(--text3)'},
    ],
    searchPlaceholder: '搜索夏令营 / 学校…',
    infoPlaceholder: '如：联系导师情况、录取要求、优营条件等',
  },
  prec: {
    key: 'baoyan_prec_v1', label: '预推免',
    namePlaceholder: '如：信息学院预推免', schoolPlaceholder: '如：清华大学',
    sentLabel: '是否联系', sentDateLabel: '联系日期', deadlineLabel: '截止日期',
    replyOptions: ['待回复','已接收','笔试/面试','录取','拒绝','排除'],
    dropStates: ['排除'],
    replyColors: {
      '已接收':'background:#E6F1FB;color:#185FA5','笔试/面试':'background:#FAEEDA;color:#BA7517',
      '录取':'background:#EAF3DE;color:#3B6D11','拒绝':'background:#FCEBEB;color:#A32D2D',
      '待回复':'background:var(--surface2);color:var(--text3)','排除':'background:var(--surface2);color:var(--text3)',
    },
    statDefs: [
      {l:'总计',   f:a=>a.length,                                     c:'var(--text)'},
      {l:'已联系', f:a=>a.filter(i=>i.sent==='yes').length,           c:'#185FA5'},
      {l:'已接收', f:a=>a.filter(i=>i.reply==='已接收').length,       c:'#534AB7'},
      {l:'面试中', f:a=>a.filter(i=>i.reply==='笔试/面试').length,    c:'#BA7517'},
      {l:'已录取', f:a=>a.filter(i=>i.reply==='录取').length,         c:'#3B6D11'},
      {l:'已拒绝', f:a=>a.filter(i=>i.reply==='拒绝').length,         c:'#A32D2D'},
    ],
    searchPlaceholder: '搜索院校 / 项目名…',
    infoPlaceholder: '如：材料要求、笔试时间、联系人等',
    extraField: true, extraLabel: '联系方式', extraPlaceholder: '导师邮箱或电话',
  },
  lab: {
    key: 'baoyan_lab_v1', label: '实验室',
    namePlaceholder: '如：视觉智能实验室', schoolPlaceholder: '如：北京大学',
    sentLabel: '是否套磁', sentDateLabel: '套磁日期', deadlineLabel: '回复截止',
    replyOptions: ['未套磁','已套磁','待回复','有意向','面谈中','已确认','无名额','排除'],
    dropStates: ['无名额','排除'],
    replyColors: {
      '已确认':'background:#EAF3DE;color:#3B6D11','有意向':'background:#E6F1FB;color:#185FA5',
      '面谈中':'background:#FAEEDA;color:#BA7517',
      '已套磁':'background:#EEEDFE;color:#534AB7',
      '未套磁':'background:var(--surface2);color:var(--text3)',
      '待回复':'background:var(--surface2);color:var(--text3)',
      '无名额':'background:#FCEBEB;color:#A32D2D','排除':'background:var(--surface2);color:var(--text3)',
    },
    statDefs: [
      {l:'总计',   f:a=>a.length,                                   c:'var(--text)'},
      {l:'已套磁', f:a=>a.filter(i=>i.sent==='yes').length,         c:'#534AB7'},
      {l:'有意向', f:a=>a.filter(i=>i.reply==='有意向').length,     c:'#185FA5'},
      {l:'面谈中', f:a=>a.filter(i=>i.reply==='面谈中').length,     c:'#BA7517'},
      {l:'已确认', f:a=>a.filter(i=>i.reply==='已确认').length,     c:'#3B6D11'},
      {l:'无名额', f:a=>a.filter(i=>i.reply==='无名额').length,     c:'#A32D2D'},
    ],
    searchPlaceholder: '搜索实验室 / 学校…',
    infoPlaceholder: '如：研究方向、导师主页、套磁进展等',
    extraField: true, extraLabel: '导师', extraPlaceholder: '如：张三教授',
  },
};

const PRIORITY_STYLES = {
  high: 'background:#FCEBEB;color:#A32D2D',
  mid:  'background:#FAEEDA;color:#BA7517',
  low:  'background:var(--surface2);color:var(--text3)',
};
const PRIORITY_LABELS = { high:'高', mid:'中', low:'普' };

let _trackType = 'camp';
let _trackData = { camp:[], prec:[], lab:[] };
let _trackEditId = null;
let _trackSelected = new Set();

function trackLoad(){
  Object.keys(TRACK_TYPES).forEach(t=>{
    try{ _trackData[t] = JSON.parse(localStorage.getItem(TRACK_TYPES[t].key)||'[]'); }
    catch(_){ _trackData[t]=[]; }
    // 旧数据迁移：补充缺失的 priority 字段
    _trackData[t].forEach(i=>{ if(!i.priority) i.priority='low'; });
  });
}
function trackSave(t){ localStorage.setItem(TRACK_TYPES[t].key, JSON.stringify(_trackData[t])); }
function tEsc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function tFmt(d){ return d ? d.replace(/-/g,'.') : '—'; }

function tDeadlineStyle(d){
  if(!d) return '';
  const diff = (new Date(d) - new Date()) / 864e5;
  if(diff < 0)   return 'color:#A32D2D;font-weight:600';
  if(diff <= 3)  return 'color:#A32D2D;font-weight:600';
  if(diff <= 7)  return 'color:#A32D2D';
  if(diff <= 14) return 'color:#BA7517';
  return 'color:var(--text3)';
}

function tCountdown(d){
  if(!d) return '';
  const diff = Math.round((new Date(d) - new Date()) / 864e5);
  if(diff < 0)  return `<span style="font-size:10px;color:#A32D2D"> 已过期</span>`;
  if(diff === 0) return `<span style="font-size:10px;color:#A32D2D"> 今天截止</span>`;
  if(diff <= 7) return `<span style="font-size:10px;color:#A32D2D"> 还剩${diff}天</span>`;
  if(diff <= 14)return `<span style="font-size:10px;color:#BA7517"> 还剩${diff}天</span>`;
  return '';
}

function trackReplyBadge(t, r){
  const style = TRACK_TYPES[t].replyColors[r] || 'background:var(--surface2);color:var(--text3)';
  const label = (r==='待回复'||r==='未套磁') ? '—' : r;
  return `<span style="${style};padding:2px 8px;border-radius:20px;font-size:11px">${label}</span>`;
}

function trackRenderStats(t, items){
  const cfg = TRACK_TYPES[t];
  return `<div style="display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:12px">
    ${cfg.statDefs.map(s=>`
    <div style="background:var(--surface2);border-radius:8px;padding:8px 10px;text-align:center">
      <div style="font-size:20px;font-weight:600;color:${s.c}">${s.f(items)}</div>
      <div style="font-size:11px;color:var(--text3);margin-top:2px">${s.l}</div>
    </div>`).join('')}
  </div>`;
}

// 备注预览：纯文本截断显示，含图片时显示缩略图
function tInfoPreview(info){
  if(!info||info==='—') return '<span style="color:var(--text3)">—</span>';
  // 检查是否含 <img 标签（富文本模式存的HTML）
  if(info.includes('<img')){
    const tmp = document.createElement('div');
    tmp.innerHTML = info;
    const imgs = tmp.querySelectorAll('img');
    const txt  = tmp.textContent.trim().slice(0,30);
    const imgThumb = imgs.length
      ? `<img src="${imgs[0].src}" style="height:20px;width:auto;border-radius:3px;margin-right:4px;vertical-align:middle;object-fit:cover">`
      : '';
    return imgThumb + (txt ? `<span>${txt.slice(0,20)}${txt.length>20?'…':''}</span>` : `<span style="color:var(--text3)">${imgs.length}张图</span>`);
  }
  // 纯文本
  const plain = info.replace(/<[^>]+>/g,'').trim();
  return `<span title="${plain.replace(/"/g,'&quot;')}">${plain.slice(0,28)}${plain.length>28?'…':''}</span>`;
}

function trackRowHtml(t, i, isDrop){
  const cfg = TRACK_TYPES[t];
  const dl = i.deadline
    ? `<span style="${tDeadlineStyle(i.deadline)}">${tFmt(i.deadline)}</span>${tCountdown(i.deadline)}`
    : '—';
  const sentWord = cfg.sentLabel==='是否套磁'?['已套磁','未套磁']:
                   cfg.sentLabel==='是否联系'?['已联系','未联系']:['已投递','未投递'];
  const sentBadge = i.sent==='yes'
    ? `<span style="background:#EAF3DE;color:#3B6D11;padding:2px 8px;border-radius:20px;font-size:11px">${sentWord[0]}</span>`

function trackGetFiltered(t){
  const q  = (document.getElementById('tr-search')?.value||'').toLowerCase();
  const fs = document.getElementById('tr-f-sent')?.value||'';
  const fr = document.getElementById('tr-f-reply')?.value||'';
  const fp = document.getElementById('tr-f-pri')?.value||'';
  const so = document.getElementById('tr-f-sort')?.value||'deadline';
  let list = _trackData[t].filter(i=>{
    if(q && !i.name.toLowerCase().includes(q) && !i.school.toLowerCase().includes(q)
         && !(i.extra||'').toLowerCase().includes(q) && !(i.info||'').toLowerCase().includes(q)) return false;
    if(fs && i.sent!==fs) return false;
    if(fr && i.reply!==fr) return false;
    if(fp && (i.priority||'low')!==fp) return false;
    return true;
  });
  list.sort((a,b)=>{
    // 置顶项始终在前
    if(a.starred&&!b.starred) return -1;
    if(!a.starred&&b.starred)  return 1;
    if(so==='deadline'){
      if(!a.deadline&&!b.deadline) return 0;
      if(!a.deadline) return 1; if(!b.deadline) return -1;
      return a.deadline.localeCompare(b.deadline);
    }
    if(so==='priority'){
      const o=['high','mid','low'];
      return o.indexOf(a.priority||'low')-o.indexOf(b.priority||'low');
    }
    if(so==='name') return a.school.localeCompare(b.school);
    if(so==='reply'){
      const o=TRACK_TYPES[t].replyOptions;
      return o.indexOf(a.reply)-o.indexOf(b.reply);
    }
    return b.addedAt-a.addedAt;
  });
  return list;
}

// 保存前处理：把编辑区内纯文字图片URL自动转成<img>，返回处理后的HTML
function trmProcessInfo(editor){
  if(!editor) return '';
  // 策略：取 innerText（纯文本），扫描所有行，图片URL行转成 <img>，其余保留原 HTML
  // 这样能应对浏览器自动加斜体/span等情况导致URL被拆散的问题
  const IMG_EXT_RE = /^https?:\/\/\S+\.(?:jpg|jpeg|png|gif|webp|svg|bmp)(\?\S*)?$/i;
  const GENERAL_IMG_RE = /https?:\/\/\S+\.(?:jpg|jpeg|png|gif|webp|svg|bmp)(\?\S*)?/gi;

  // 先检查：编辑区里已有的内容是否含纯文字图片URL（可能被浏览器套了格式标签）
  // 取 innerText 按行扫描
  const lines = editor.innerText.split('\n');
  const hasRawUrl = lines.some(l => IMG_EXT_RE.test(l.trim()) || GENERAL_IMG_RE.test(l));

  if(hasRawUrl){
    // 重建 HTML：逐行判断，图片URL行 → <img>，其余行保留文字
    GENERAL_IMG_RE.lastIndex = 0;
    const newHtml = lines.map(line => {
      const trimmed = line.trim();
      if(!trimmed) return '';
      // 检查这行是否含图片URL
      GENERAL_IMG_RE.lastIndex = 0;
      let result = trimmed;
      let hasImg = false;
      result = result.replace(GENERAL_IMG_RE, (url) => {
        hasImg = true;
        return `<img src="${url}" style="max-width:100%;border-radius:4px;margin:4px 0;display:block" contenteditable="false">`;
      });
      return hasImg ? result : `<div>${result}</div>`;
    }).filter(Boolean).join('');
    // 保留编辑区里已有的 <img>（已渲染的不重复处理）
    editor.innerHTML = newHtml;
  }
  return editor.innerHTML.trim();
}

function trmHandlePaste(e){

  for(let item of items){

      return;
    }
  }
}

// 压缩图片到 ≤200KB 后以 base64 插入编辑器
function trmCompressAndInsert(file){
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      let w = img.width, h = img.height;
      // 限制最大宽度 800px
      if(w > 800){ h = Math.round(h * 800/w); w = 800; }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      // 逐步降质量直到 ≤200KB
      let quality = 0.85;
      let dataUrl = canvas.toDataURL('image/jpeg', quality);
      while(dataUrl.length > 270000 && quality > 0.2){
        quality -= 0.1;
        dataUrl = canvas.toDataURL('image/jpeg', quality);
      }
      trmInsertImg(dataUrl);
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function calcGPA(){
  const from=document.getElementById('gpa-from').value;
  const val=parseFloat(document.getElementById('gpa-val').value)||0;
  const total=parseInt(document.getElementById('rank-total').value)||0;
  const pos=parseInt(document.getElementById('rank-pos').value)||0;
  let pct=0;
  if(from==='4.0') pct=val/4.0*100;
  else if(from==='4.3') pct=val/4.3*100;
  else if(from==='5.0') pct=val/5.0*100;
  else pct=val;
  const to40=(pct/100*4.0).toFixed(2);
  const to43=(pct/100*4.3).toFixed(2);
  const to50=(pct/100*5.0).toFixed(2);
  const toPct=pct.toFixed(1);
  let rankLine='';
  if(total>0&&pos>0){
    const rankPct=((pos/total)*100).toFixed(1);
    const tier=rankPct<=5?'顶尖（前5%）':rankPct<=10?'优秀（前10%）':rankPct<=20?'良好（前20%）':rankPct<=30?'中等（前30%）':'一般';
    rankLine=`<br>排名：${pos}/${total}（前 ${rankPct}%）→ ${tier}`;
  }
  const el=document.getElementById('gpa-result');
  el.innerHTML=`<b>换算结果：</b>4.0制 ${to40} | 4.3制 ${to43} | 5.0制 ${to50} | 百分制 ${toPct}${rankLine}`;
  el.style.display='block';
}

(function(){
  const EDGE = 8; // 拖拽感应边距 px
  let dragging = false, startX, startY, startW, startH, startL, startT, edge;

  function getEdge(e, box){
    const r = box.getBoundingClientRect();
    const x = e.clientX - r.left, y = e.clientY - r.top;
    const w = r.width, h = r.height;
    const top    = y < EDGE;
    const bottom = y > h - EDGE;
    const left   = x < EDGE;
    const right  = x > w - EDGE;
    if(top && left)    return 'nw';
    if(top && right)   return 'ne';
    if(bottom && left) return 'sw';
    if(bottom && right)return 'se';
    if(top)    return 'n';
    if(bottom) return 's';
    if(left)   return 'w';
    if(right)  return 'e';
    return null;
  }

  const cursors = {n:'n-resize',s:'s-resize',e:'e-resize',w:'w-resize',
                   nw:'nw-resize',ne:'ne-resize',sw:'sw-resize',se:'se-resize'};

  document.addEventListener('mousemove', e=>{
    const box = document.getElementById('tr-modal-box');
    if(!box || document.getElementById('tr-modal')?.style.display==='none') return;
    if(dragging){
      const dx = e.clientX - startX, dy = e.clientY - startY;
      const modal = document.getElementById('tr-modal');
      if(edge.includes('e')) box.style.width  = Math.max(600, startW + dx) + 'px';
      if(edge.includes('s')) box.style.height = Math.max(400, startH + dy) + 'px';
      if(edge.includes('w')){
        const nw = Math.max(600, startW - dx);
        box.style.width = nw + 'px';
      }
      if(edge.includes('n')){
        const nh = Math.max(400, startH - dy);
        box.style.height = nh + 'px';
      }
      e.preventDefault();
    } else {
      const eg = getEdge(e, box);
      box.style.cursor = eg ? (cursors[eg]||'default') : '';
    }
  });

  document.addEventListener('mousedown', e=>{
    const box = document.getElementById('tr-modal-box');
    if(!box || document.getElementById('tr-modal')?.style.display==='none') return;
    const eg = getEdge(e, box);
    if(!eg) return;
    const r = box.getBoundingClientRect();
    dragging = true; edge = eg;
    startX = e.clientX; startY = e.clientY;
    startW = r.width;   startH = r.height;
    e.preventDefault();
  });

  document.addEventListener('mouseup', ()=>{ dragging = false; });
})();
</script>

<script>
// ── 全局快捷键监听（从 profile.html 读取配置） ────────────────────────
(function(){
  const HK_KEY = 'baoyan_hotkeys';
  function hkLoad(){
    try{ return JSON.parse(localStorage.getItem(HK_KEY)||'null'); }
    catch(_){ return null; }
  }
  function parseKey(str){
    // 'Ctrl+Shift+B' → {ctrl,shift,alt,key:'b'}
    const parts = str.split('+').map(s=>s.trim().toLowerCase());
    return {
      ctrl:  parts.includes('ctrl'),
      shift: parts.includes('shift'),
      alt:   parts.includes('alt'),
      key:   parts.find(p=>!['ctrl','shift','alt'].includes(p))||'',
    };
  }
  function matchKey(e, parsed){
    return e.ctrlKey===parsed.ctrl && e.shiftKey===parsed.shift
        && e.altKey===parsed.alt && e.key.toLowerCase()===parsed.key;
  }
  document.addEventListener('keydown', e=>{
    // 只在备注编辑区或追踪页有效
    const inEditor = document.activeElement?.id==='trm-info-editor';
    const hks = hkLoad(); if(!hks) return;
    for(const hk of hks){
      if(!hk.key) continue;
      const parsed = parseKey(hk.key);
      if(!matchKey(e, parsed)) continue;
      // 匹配到快捷键
      switch(hk.action){
        case 'bold':         if(inEditor){ e.preventDefault(); trmCmd('bold'); } break;
        case 'italic':       if(inEditor){ e.preventDefault(); trmCmd('italic'); } break;
        case 'underline':    if(inEditor){ e.preventDefault(); trmCmd('underline'); } break;
        case 'strikeThrough':if(inEditor){ e.preventDefault(); trmCmd('strikeThrough'); } break;
        case 'insertLink':   if(inEditor){ e.preventDefault(); trmInsertLink(); } break;
        case 'insertUL':     if(inEditor){ e.preventDefault(); trmCmd('insertUnorderedList'); } break;
        case 'insertOL':     if(inEditor){ e.preventDefault(); trmCmd('insertOrderedList'); } break;
        case 'saveRecord':
          if(document.getElementById('tr-modal')?.style.display!=='none'){
            e.preventDefault(); trackSaveItem();
          } break;
        case 'newRecord':
          if(document.getElementById('tab-tracker')?.classList.contains('active')){
            e.preventDefault(); trackOpenAdd(_trackType);
          } break;
      }
      break;
    }
  });
})();
</script>

<script>
(function(){
  function init(){ if(typeof lucide!=="undefined") lucide.createIcons(); }
  var s=document.createElement("script");
  s.src="/js/lucide.min.js";
  s.onload=init;
  s.onerror=function(){
    var c=document.createElement("script");
    c.src="https://unpkg.com/lucide@0.513.0/dist/umd/lucide.min.js";
    c.onload=init;
    /* 两者都失败时 <i data-lucide> 被 CSS display:none 隐藏，不留空格 */
    document.head.appendChild(c);
  };
  document.head.appendChild(s);
})();
</script>
