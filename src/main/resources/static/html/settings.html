<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>系统设置 · 保研导航</title>
<link rel="stylesheet" href="/css/frontend.css">
<style>
.settings-wrap{max-width:820px;margin:0 auto;padding:28px 24px 80px}
.settings-section{background:var(--surface);border:.5px solid var(--border);border-radius:12px;padding:24px 28px;margin-bottom:20px}
.settings-section-title{font-size:14px;font-weight:700;margin-bottom:4px;color:var(--text)}
.settings-section-desc{font-size:12px;color:var(--text3);margin-bottom:18px;line-height:1.6}
.hk-table{width:100%;border-collapse:collapse}
.hk-table th{font-size:11px;color:var(--text3);font-weight:600;padding:6px 10px;text-align:left;border-bottom:.5px solid var(--border);background:var(--surface2)}
.hk-table td{padding:8px 10px;border-bottom:.5px solid var(--border);vertical-align:middle}
.hk-table tr:last-child td{border-bottom:none}
.hk-table tr:hover td{background:var(--surface2)}
.key-recorder{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border:.5px solid var(--border2);border-radius:7px;background:var(--surface);color:var(--text);font-size:12px;font-family:var(--font-mono,monospace);cursor:pointer;min-width:130px;min-height:30px;user-select:none;transition:border-color .15s}
.key-recorder:focus{outline:none;border-color:var(--purple-mid,#7c4dff);box-shadow:0 0 0 2px rgba(124,77,255,.15)}
.key-recorder.listening{border-color:var(--purple-mid,#7c4dff);background:var(--purple-bg,#EEEDFE);color:var(--purple-txt,#534AB7);animation:pulse .8s infinite}
.key-recorder.listening::after{content:'按下快捷键…';font-size:11px;color:var(--purple-txt,#534AB7)}
.key-recorder:not(.listening) .key-display{display:inline}
.key-recorder.listening .key-display{display:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.key-badge{display:inline-block;background:var(--surface2);border:.5px solid var(--border2);border-radius:4px;padding:1px 6px;font-size:11px;margin-right:2px;font-family:monospace}
.action-sel{padding:5px 8px;border:.5px solid var(--border2);border-radius:7px;background:var(--surface);color:var(--text);font-size:12px;width:100%}
.label-input{padding:5px 8px;border:.5px solid var(--border2);border-radius:7px;background:var(--surface);color:var(--text);font-size:12px;width:100%}
.btn-row{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
.btn-save{padding:7px 20px;border-radius:8px;border:none;background:var(--purple-mid,#7c4dff);color:#fff;font-size:13px;font-weight:600;cursor:pointer}
.btn-reset{padding:7px 16px;border-radius:8px;border:.5px solid var(--border2);background:var(--surface);color:var(--text2);font-size:13px;cursor:pointer}
.btn-add{padding:6px 14px;border-radius:7px;border:.5px solid var(--border2);background:var(--surface);color:var(--text2);font-size:12px;cursor:pointer}
.save-msg{font-size:12px;color:var(--green-txt,#3B6D11);display:none;align-items:center;gap:4px}
.conflict-warn{font-size:11px;color:var(--coral-txt,#A32D2D);margin-top:4px;display:none}
.del-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:16px;padding:2px 6px;border-radius:4px}
.del-btn:hover{color:var(--coral-txt,#A32D2D);background:var(--surface2)}
</style>
<script src="/js/core/nav.js"></script>
<script src="/js/core/auth.js"></script>
</head>
<body>
<nav class="topnav"></nav>

<div class="settings-wrap">
  <div style="margin-bottom:24px">
    <h1 style="font-size:20px;font-weight:700;margin-bottom:4px">系统设置</h1>
    <p style="font-size:13px;color:var(--text3)">个性化配置，存储在本地浏览器</p>
  </div>

  <!-- 快捷键 -->
  <div class="settings-section">
    <div class="settings-section-title">自定义快捷键</div>
    <div class="settings-section-desc">
      点击「按下快捷键…」录制区，再按下你想要的组合键（如 Ctrl+B）即可录制。<br>
      快捷键在「工具箱」申请追踪、文档生成等页面的编辑区内生效。
    </div>

    <table class="hk-table" id="hk-table">
      <thead>
        <tr>
          <th style="width:30%">快捷键</th>
          <th style="width:30%">动作</th>
          <th style="width:28%">备注说明</th>
          <th style="width:12%"></th>
        </tr>
      </thead>
      <tbody id="hk-tbody"></tbody>
    </table>

    <div id="conflict-msg" class="conflict-warn">⚠ 存在重复的快捷键，请修改后保存</div>

    <div class="btn-row">
      <button class="btn-add" onclick="hkAddRow()">＋ 添加快捷键</button>
      <button class="btn-reset" onclick="hkReset()">恢复默认</button>
      <button class="btn-save" onclick="hkSave()">保存</button>
      <span class="save-msg" id="save-msg">✅ 已保存</span>
    </div>
  </div>

  <!-- 外观（占位） -->
  <div class="settings-section">
    <div class="settings-section-title">外观与语言</div>
    <div class="settings-section-desc">更多设置即将上线</div>
    <div style="font-size:12px;color:var(--text3)">主题色、字体大小等设置正在开发中…</div>
  </div>
</div>

<script>
const HK_KEY = 'baoyan_hotkeys';

const HK_DEFAULTS = [
  {key:'Ctrl+B',        action:'bold',        label:'加粗'},
  {key:'Ctrl+I',        action:'italic',      label:'斜体'},
  {key:'Ctrl+U',        action:'underline',   label:'下划线'},
  {key:'Ctrl+K',        action:'insertLink',  label:'插入链接'},
  {key:'Ctrl+Shift+U',  action:'insertUL',    label:'无序列表'},
  {key:'Ctrl+Shift+O',  action:'insertOL',    label:'有序列表'},
  {key:'Alt+S',         action:'saveRecord',  label:'保存记录（追踪页）'},
  {key:'Alt+N',         action:'newRecord',   label:'新建记录（追踪页）'},
];

const HK_ACTIONS = [
  ['bold','加粗'],['italic','斜体'],['underline','下划线'],['strikeThrough','删除线'],
  ['insertLink','插入链接'],['insertUL','无序列表'],['insertOL','有序列表'],
  ['saveRecord','保存记录（追踪页）'],['newRecord','新建记录（追踪页）'],
];

function hkLoad(){
  try{ return JSON.parse(localStorage.getItem(HK_KEY)||'null')||[...HK_DEFAULTS]; }
  catch(_){ return [...HK_DEFAULTS]; }
}

function keyToDisplay(key){
  if(!key) return '';
  return key.split('+').map(k=>`<span class="key-badge">${k}</span>`).join('+');
}

// 把 KeyboardEvent 转成统一的键字符串
function eventToKey(e){
  const parts = [];
  if(e.ctrlKey || e.metaKey) parts.push('Ctrl');
  if(e.shiftKey) parts.push('Shift');
  if(e.altKey)   parts.push('Alt');
  let k = e.key;
  if(['Control','Shift','Alt','Meta'].includes(k)) return null; // 纯修饰键不算
  if(k.length === 1) k = k.toUpperCase();
  parts.push(k);
  return parts.join('+');
}

let _listeningEl = null;

function startListening(el){
  if(_listeningEl) stopListening(_listeningEl);
  _listeningEl = el;
  el.classList.add('listening');
  el.dataset.orig = el.dataset.key || '';
  el.querySelector('.key-display').innerHTML = '';
}

function stopListening(el){
  el.classList.remove('listening');
  _listeningEl = null;
}

document.addEventListener('keydown', e=>{
  if(!_listeningEl) return;
  const key = eventToKey(e);
  if(!key) return;
  e.preventDefault(); e.stopPropagation();
  _listeningEl.dataset.key = key;
  _listeningEl.querySelector('.key-display').innerHTML = keyToDisplay(key);
  stopListening(_listeningEl);
  checkConflicts();
}, true);

document.addEventListener('click', e=>{
  if(_listeningEl && !_listeningEl.contains(e.target)){
    // 点击其他地方取消录制，恢复原来的值
    _listeningEl.dataset.key = _listeningEl.dataset.orig || '';
    _listeningEl.querySelector('.key-display').innerHTML = keyToDisplay(_listeningEl.dataset.key);
    stopListening(_listeningEl);
  }
});

function hkRowHtml(h, i){
  const opts = HK_ACTIONS.map(([v,l])=>`<option value="${v}"${h.action===v?' selected':''}>${l}</option>`).join('');
  return `<tr data-row="${i}">
    <td>
      <div class="key-recorder" tabindex="0" data-key="${h.key||''}" data-row="${i}"
           onclick="startListening(this)" onkeydown="if(event.key==='Enter'||event.key===' ')startListening(this)"
           title="点击后按下想要的快捷键组合">
        <span class="key-display">${keyToDisplay(h.key||'')}</span>
      </div>
    </td>
    <td><select class="action-sel" data-row="${i}">${opts}</select></td>
    <td><input class="label-input" value="${h.label||''}" placeholder="说明（可选）" data-row="${i}"></td>
    <td><button class="del-btn" onclick="hkDelRow(${i})" title="删除">×</button></td>
  </tr>`;
}

function hkRender(){
  const tbody = document.getElementById('hk-tbody');
  if(!tbody) return;
  const hks = hkLoad();
  tbody.innerHTML = hks.map((h,i)=>hkRowHtml(h,i)).join('');
}

function hkAddRow(){
  const tbody = document.getElementById('hk-tbody');
  const i = tbody.children.length;
  const div = document.createElement('tbody');
  div.innerHTML = hkRowHtml({key:'',action:'bold',label:''},i);
  tbody.appendChild(div.firstChild);
}

function hkDelRow(i){
  const tr = document.querySelector(`tr[data-row="${i}"]`);
  if(tr) tr.remove();
  // 重新给剩余行编号
  document.querySelectorAll('#hk-tbody tr').forEach((tr,idx)=>{
    tr.dataset.row = idx;
    tr.querySelectorAll('[data-row]').forEach(el=>el.dataset.row=idx);
    const delBtn = tr.querySelector('.del-btn');
    if(delBtn) delBtn.setAttribute('onclick',`hkDelRow(${idx})`);
  });
}

function checkConflicts(){
  const keys = [...document.querySelectorAll('#hk-tbody .key-recorder')]
    .map(el=>el.dataset.key).filter(Boolean);
  const dups = keys.filter((k,i)=>keys.indexOf(k)!==i);
  const warn = document.getElementById('conflict-msg');
  warn.style.display = dups.length ? 'block' : 'none';
  return dups.length === 0;
}

function hkSave(){
  if(!checkConflicts()) return;
  const rows = document.querySelectorAll('#hk-tbody tr');
  const hks = [...rows].map(tr=>{
    const key    = tr.querySelector('.key-recorder')?.dataset.key || '';
    const action = tr.querySelector('.action-sel')?.value || '';
    const label  = tr.querySelector('.label-input')?.value.trim() || '';
    return {key, action, label};
  }).filter(h=>h.key && h.action);
  localStorage.setItem(HK_KEY, JSON.stringify(hks));
  const msg = document.getElementById('save-msg');
  msg.style.display = 'flex';
  setTimeout(()=>msg.style.display='none', 2500);
}

function hkReset(){
  if(!confirm('恢复所有默认快捷键？当前配置将丢失。')) return;
  localStorage.setItem(HK_KEY, JSON.stringify(HK_DEFAULTS));
  hkRender();
}

hkRender();
</script>
</body>
</html>
