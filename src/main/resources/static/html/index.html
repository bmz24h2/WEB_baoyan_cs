<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>985/211 CS 预推免强弱 com 导航</title>
<link rel="stylesheet" href="/css/frontend.css">
<!-- 无内联 <style>：.topnav/.layout/.sidebar 高度统一由 frontend.css 定义（48px） -->
<script src="/js/core/nav.js"></script>
<script src="/js/core/auth.js"></script>
</head>
<body>

<nav class="topnav"></nav>

<div class="layout">

  <nav class="sidebar">
    <div class="sidebar-title">梯队</div>
    <button class="sidebar-link active" data-tier="all"     onclick="setTier(this)">全部</button>
    <button class="sidebar-link" data-tier="顶尖C9"  onclick="setTier(this)"><span class="tdot" style="background:var(--purple-mid)"></span>顶尖 C9</button>
    <button class="sidebar-link" data-tier="上游985" onclick="setTier(this)"><span class="tdot" style="background:var(--blue-mid)"></span>上游 985</button>
    <button class="sidebar-link" data-tier="中游985" onclick="setTier(this)"><span class="tdot" style="background:var(--green-mid)"></span>中游 985</button>
    <button class="sidebar-link" data-tier="中下游985" onclick="setTier(this)"><span class="tdot" style="background:var(--amber-mid)"></span>中下游 985</button>
    <button class="sidebar-link" data-tier="末流985" onclick="setTier(this)"><span class="tdot" style="background:var(--coral-mid)"></span>末流 985</button>
    <button class="sidebar-link" data-tier="中科院"  onclick="setTier(this)"><span class="tdot" style="background:#888"></span>中科院</button>
    <div class="sidebar-title" style="margin-top:10px">211 梯队</div>
    <button class="sidebar-link" data-tier="顶级211" onclick="setTier(this)"><span class="tdot" style="background:var(--purple-mid)"></span>顶级 211</button>
    <button class="sidebar-link" data-tier="中上211" onclick="setTier(this)"><span class="tdot" style="background:var(--blue-mid)"></span>中上 211</button>
    <button class="sidebar-link" data-tier="中流211" onclick="setTier(this)"><span class="tdot" style="background:var(--green-mid)"></span>中流 211</button>
    <button class="sidebar-link" data-tier="中下211" onclick="setTier(this)"><span class="tdot" style="background:var(--amber-mid)"></span>中下 211</button>
    <button class="sidebar-link" data-tier="末流211" onclick="setTier(this)"><span class="tdot" style="background:var(--coral-mid)"></span>末流 211</button>
    <div class="sidebar-title" style="margin-top:10px">省份</div>
    <div id="prov"></div>
  </nav>

  <main class="main">
    <div class="page-header">
      <h1>985 / 211 CS 预推免强弱 com 导航 <span id="api-status" class="api-status"></span></h1>
      <p>数据来源：小红书 @8052244911 · 211 排名图 · 官网链接为已知域名</p>
    </div>

    <div class="source-note">
      ✅ 985 强/弱 com 数据 100% 来自小红书 @8052244911 上传图片<br>
      ✅ 211 分档数据来自 211 大学排名图（顶级/中上/中流/中下/末流）<br>
      ✅ 全部院校数据内嵌于 frontend.js，无需后端即可浏览
    </div>

    <div class="legend">
      <span style="font-size:12px;color:var(--text3)">院系标注：</span>
      <div class="legend-item"><div class="ldot" style="background:var(--strong-bg);border:1px solid var(--strong-border)"></div><span style="color:var(--strong-txt)">强 com</span></div>
      <div class="legend-item"><div class="ldot" style="background:var(--weak-bg);border:1px solid var(--weak-border)"></div><span style="color:var(--weak-txt)">弱 com</span></div>
      <div class="legend-item"><div class="ldot" style="background:var(--mix-bg);border:1px solid var(--mix-border)"></div><span style="color:var(--mix-txt)" title="该院系博士推免和硕士推免的竞争力不同，如「博强+硕弱」表示博士名额竞争激烈（强com），硕士名额相对宽松（弱com）">博/硕不同 <span style="font-size:10px;opacity:.6">?</span></span></div>
    </div>

    <div class="toolbar">
      <input type="text" id="sb" placeholder="搜索院校名或院系名…" oninput="render()">
      <select id="cf" onchange="render()">
        <option value="">不限强弱</option>
        <option value="hasStrong">含强 com 院系</option>
        <option value="allWeak">全部弱 com</option>
      </select>
    </div>

    <div class="grid" id="grid"></div>
  </main>
</div>

<div class="overlay" id="ov" onclick="closeP(event)">
  <div class="panel" id="panel">
    <button class="pclose" onclick="closeP()">✕</button>
    <div id="pc"></div>
  </div>
</div>

<script src="/js/frontend.js"></script>
<script>
// 检测后端状态
(async()=>{
  const el=document.getElementById('api-status');
  if(!el) return;                       // 元素不存在时直接跳过，避免 null.textContent 报错
  try{
    const r=await fetch('/api/teachers/stats',{signal:AbortSignal.timeout(2000)});
    if(r.ok){el.textContent='✅ 后端已连接';el.classList.add('ok');}
    else throw new Error();
  }catch(_){
    el.textContent='⚠ 后端未连接';
    el.classList.add('warn');
  }
})();
</script>
<script>
(function(){
  function init(){ if(typeof lucide!=="undefined") lucide.createIcons(); }
  var s=document.createElement("script");
  s.src="/js/lucide.min.js";
  s.onload=init;
  s.onerror=function(){
    var c=document.createElement("script");
    c.src="https://unpkg.com/lucide@0.513.0/dist/umd/lucide.min.js";
    c.onload=init;
    /* 两者都失败时 <i data-lucide> 被 CSS display:none 隐藏，不留空格 */
    document.head.appendChild(c);
  };
  document.head.appendChild(s);
})();
</script>
</body>
</html>
