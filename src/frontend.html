<!DOCTYPE html>

  <button class="sidebar-link" data-tier="顶尖C9" onclick="setTier(this)"><span class="tdot" style="background:var(--purple-mid)"></span>顶尖 C9</button>

<main class="main">

  </div>

  <div class="source-note">
    ✅ 强 / 弱 com 数据 100% 来自你上传的图片，原帖 @8052244911<br>

    <div class="legend-item"><div class="ldot" style="background:var(--weak-bg);border:1px solid var(--weak-border)"></div><span style="color:var(--weak-txt)">弱 com</span></div>

  <div class="toolbar">

    <select id="cf" onchange="render()">
      <option value="">不限强弱</option>

      <option value="allWeak">全部弱 com</option>

  </div>

</main>

<div class="overlay" id="ov" onclick="closeP(event)">
  <div class="panel" id="panel">
